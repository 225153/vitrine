<mat-toolbar [class.glass]="isScrolled" class="navbar shadow-sm">
  <div class="container d-flex justify-content-between align-items-center w-100">
    <div class="logo-container" (click)="scrollTo('hero')">
      <span class="logo fw-bold">Vitrine<span class="text-primary">.</span>Pro</span>
    </div>

    <!-- Desktop Menu -->
    <div class="nav-links d-none d-md-flex align-items-center gap-3">
      <button mat-button (click)="scrollTo('hero')">Accueil</button>
      <button mat-button (click)="scrollTo('about')">À Propos</button>
      <button mat-button (click)="scrollTo('services')">Services</button>
      <button mat-button (click)="scrollTo('portfolio')">Réalisations</button>
      <button mat-button (click)="scrollTo('testimonials')">Témoignages</button>
      <button mat-raised-button color="primary" class="ms-3 btn-shimmer text-white" (click)="scrollTo('contact')">Contact</button>
    </div>

    <!-- Mobile Menu Toggle -->
    <button mat-icon-button class="d-md-none" (click)="toggleMobileMenu()">
      <mat-icon>{{ isMobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>
</mat-toolbar>

<!-- Mobile Menu Overlay -->
<div class="mobile-menu glass" *ngIf="isMobileMenuOpen">
  <div class="d-flex flex-column align-items-center p-4 gap-3">
    <button mat-button class="w-100 py-2 fs-5" (click)="scrollTo('hero')">Accueil</button>
    <button mat-button class="w-100 py-2 fs-5" (click)="scrollTo('about')">À Propos</button>
    <button mat-button class="w-100 py-2 fs-5" (click)="scrollTo('services')">Services</button>
    <button mat-button class="w-100 py-2 fs-5" (click)="scrollTo('portfolio')">Réalisations</button>
    <button mat-button class="w-100 py-2 fs-5" (click)="scrollTo('testimonials')">Témoignages</button>
    <button mat-raised-button color="primary" class="w-100 py-2 fs-5 mt-3" (click)="scrollTo('contact')">Contact</button>
  </div>
</div>
