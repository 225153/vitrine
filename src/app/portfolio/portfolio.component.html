<section id="portfolio" class="section-spacing bg-dark-alt position-relative">
  <div class="container text-center mb-5" data-aos="fade-up">
    <span class="text-primary fw-bold text-uppercase tracking-wider small">Nos Réalisations</span>
    <h2 class="display-5 fw-bold text-white mt-2 mb-3">Portfolio Créatif</h2>
    <p class="lead text-muted mx-auto" style="max-width: 650px;">
      Découvrez une sélection de nos projets récents. Chaque création est unique et adaptée aux besoins spécifiques de nos clients.
    </p>
  </div>

  <div class="container">
    <div class="row g-4">
      <div class="col-md-6" *ngFor="let project of projects; let index = index" data-aos="zoom-in" [attr.data-aos-delay]="150 * index">
        <div class="portfolio-item position-relative overflow-hidden rounded shadow-lg">
          <img [src]="project.img" [alt]="project.title" class="img-fluid w-100 item-img">
          
          <!-- Hover Overlay -->
          <div class="portfolio-overlay position-absolute top-0 start-0 w-100 h-100 d-flex flex-column justify-content-center align-items-center text-center p-4">
            <span class="category text-primary fw-semibold mb-2 text-uppercase small">{{ project.category }}</span>
            <h3 class="title text-white fw-bold mb-4">{{ project.title }}</h3>
            <button mat-fab color="primary" class="btn-shimmer shadow-lg">
              <mat-icon>arrow_forward</mat-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="text-center mt-5" data-aos="fade-up">
      <a href="https://github.com" target="_blank" rel="noopener noreferrer" mat-stroked-button color="accent" class="btn-outline-glass px-5 py-3 fs-6 rounded-pill d-inline-flex align-items-center gap-2 text-decoration-none">
        Voir tous nos projets <mat-icon>open_in_new</mat-icon>
      </a>
    </div>
  </div>
</section>
